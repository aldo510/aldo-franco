<!DOCTYPE html>
<html>
<head>
  <title>Página no encontrada (404)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <style>
    body {
      background-color: #1d1a1d;
      color: #343a40;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: #1d1a1d;
      border: 1px solid #ddd;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }
    h1 {
      color: #dafa50;
      margin-bottom: 1em;
    }
    p {
      margin: 0.5em 0;
      color: #6c757d;
    }
    a {
      color: white;
      margin-top: 1.5rem;
      display: block;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      color: white;
    }
    .logo {
      margin-bottom: 1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/logo-white.svg" alt="Logo" class="logo">
    <h1>404 - Página no encontrada</h1>
    <p>Lo sentimos, pero la página que estás buscando no existe.</p>
    <p>Es posible que hayas escrito mal la dirección o que la página se haya movido.</p>
    <p><a href="/">Regresar a la página principal</a></p>
  </div>
</body>
</html>
